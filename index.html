<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大新店清潔紀錄系統</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#334155;
    --line:#475569; --muted:#94a3b8; --text:#e2e8f0;
    --accent:#0ea5e9; --accent2:#0284c7;
    --done:#22c55e; --done2:#16a34a; --pending:#94a3b8;
    --warn:#f59e0b; --danger:#ef4444;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    background:linear-gradient(160deg,#0b1220,#0f172a 40%,#111c33);
    color:var(--text); min-height:100vh;
  }
  .hidden{display:none !important}
  .wrap{max-width:760px;margin:0 auto;padding:16px}

  header{
    position:sticky;top:0;z-index:20;
    background:rgba(15,23,42,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .bar{max-width:760px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px}
  .bar h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.5px;flex:1}
  .badge{font-size:12px;padding:4px 10px;border-radius:999px;background:var(--panel2);color:var(--muted)}
  .badge.staff{background:#0c4a6e;color:#bae6fd}
  .badge.boss{background:#7c2d12;color:#fed7aa}
  .btn{
    border:none;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;
    cursor:pointer;background:var(--accent);color:#fff;transition:.15s;
  }
  .btn:hover{background:var(--accent2)}
  .btn.ghost{background:var(--panel2);color:var(--text)}
  .btn.ghost:hover{background:var(--line)}
  .btn.sm{padding:7px 11px;font-size:13px}
  .btn.warn{background:var(--warn)}
  .btn.danger{background:var(--danger)}

  .login-card{
    max-width:380px;margin:8vh auto 0;background:var(--panel);
    border:1px solid var(--line);border-radius:18px;padding:28px 24px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
  .login-card .logo{
    width:62px;height:62px;border-radius:16px;margin:0 auto 14px;
    background:linear-gradient(135deg,var(--accent),#22d3ee);
    display:flex;align-items:center;justify-content:center;font-size:30px;
  }
  .login-card h2{text-align:center;margin:0 0 4px;font-size:21px}
  .login-card p.sub{text-align:center;color:var(--muted);font-size:13px;margin:0 0 22px}
  label.fl{display:block;font-size:13px;color:var(--muted);margin:14px 2px 6px}
  input.fld{
    width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);
    background:#0b1324;color:var(--text);font-size:15px;
  }
  input.fld:focus{outline:none;border-color:var(--accent)}
  .login-card .btn{width:100%;margin-top:20px;padding:13px}
  .err{color:#fca5a5;font-size:13px;text-align:center;margin-top:12px;min-height:18px}
  .secret{position:fixed;bottom:0;right:0;width:64px;height:64px;cursor:default;z-index:5}

  .section-title{font-size:15px;font-weight:700;margin:18px 4px 12px;color:#cbd5e1;display:flex;align-items:center;gap:8px}
  .hint{font-size:13px;color:var(--muted);margin:0 4px 14px;line-height:1.6}
  .plan-shell{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;overflow:hidden}
  .plan{position:relative;width:100%;aspect-ratio:1040/595;container-type:inline-size}
  .room-label{
    position:absolute;display:flex;align-items:center;justify-content:center;
    font-size:7cqw;font-weight:800;color:rgba(148,163,184,.35);letter-spacing:.4em;pointer-events:none;
  }
  .stall,.fx{
    position:absolute;border:none;cursor:pointer;background:#64748b;color:#0b1220;
    display:flex;align-items:center;justify-content:center;text-align:center;
    transition:.18s;padding:0;font-weight:800;
  }
  .stall{border-radius:6px;font-size:4.6cqw;font-weight:900;flex-direction:column}
  .stall small{display:block;font-size:1.7cqw;font-weight:700;margin-top:2px;opacity:.85}
  .fx{border-radius:5px;font-size:2.5cqw;line-height:1.15;flex-direction:column}
  .fx.round{border-radius:50%}
  .fx small{font-size:1.7cqw;font-weight:700;opacity:.8;margin-top:1px}
  .stall:hover,.fx:hover{filter:brightness(1.08)}
  .stall:active,.fx:active{transform:scale(.96)}
  .stall.done,.fx.done{background:linear-gradient(135deg,var(--done),var(--done2));color:#fff;box-shadow:0 0 0 3px rgba(34,197,94,.25)}
  .c-done{background:linear-gradient(135deg,#22c55e,#16a34a)!important;color:#fff!important;box-shadow:0 0 0 3px rgba(34,197,94,.25)}
  .c-due{background:#38bdf8!important;color:#06283d!important}     /* 到期 今日待清 淡藍 */
  .c-2{background:#fde047!important;color:#3b2f0b!important}       /* 逾期1天 淡黃 */
  .c-3{background:#ea580c!important;color:#fff!important}          /* 逾期2天 深橘 */
  .c-4{background:#3f2a1d!important;color:#f5e9e0!important}       /* 逾期3天 咖啡黑 */
  .c-5{background:#dc2626!important;color:#fff!important}          /* 逾期4天以上 紅 優先 */
  .priority{animation:pulse 1.3s infinite}
  @keyframes pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
  .pri{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);background:#fff;color:#dc2626;font-weight:800;font-size:1.9cqw;line-height:1;padding:1px 3px;border-radius:4px;white-space:nowrap;display:none}
  .stall.priority .pri,.fx.priority .pri{display:block}
  .st.r{background:#7f1d1d;color:#fecaca}
  .st.neu{background:#334155;color:#cbd5e1}
  .st.due{background:#075985;color:#bae6fd}
  .stall.has-photo::after,.fx.has-photo::after{content:"📷";position:absolute;top:3px;right:4px;font-size:2.4cqw}
  .stall .tick,.fx .tick{position:absolute;top:2px;left:5px;font-size:2.6cqw;display:none}
  .stall.c-done .tick,.fx.c-done .tick{display:block}

  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:12px 4px 0;font-size:12.5px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:13px;height:13px;border-radius:4px;display:inline-block}
  .dot.g{background:#64748b}.dot.d{background:var(--done)}.dot.due{background:#38bdf8}.dot.o{background:#ea580c}.dot.r{background:#dc2626}

  .overlay{position:fixed;inset:0;background:rgba(2,6,23,.7);z-index:40;display:flex;align-items:flex-end;justify-content:center}
  .sheet{
    background:var(--panel);width:100%;max-width:760px;border-radius:20px 20px 0 0;
    border:1px solid var(--line);border-bottom:none;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));animation:up .22s ease;max-height:90vh;overflow:auto;
  }
  @keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  .sheet h3{margin:0 0 4px;font-size:19px}
  .sheet .meta{color:var(--muted);font-size:13px;margin:0 0 14px}
  .tips{background:#0b1324;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:0 0 14px}
  .tips b{font-size:13px;color:#7dd3fc}
  .tips ul{margin:8px 0 0;padding-left:20px}
  .tips li{font-size:13.5px;line-height:1.8;color:#e2e8f0}
  .photo-box{border:2px dashed var(--line);border-radius:14px;padding:18px;text-align:center;color:var(--muted);font-size:14px;margin-bottom:14px}
  .photo-box img{max-width:100%;border-radius:10px;margin-top:10px;max-height:240px}
  .row{display:flex;gap:10px}
  .row .btn{flex:1}
  .file-btn{display:block;width:100%;padding:12px;border-radius:10px;text-align:center;background:var(--panel2);color:var(--text);font-weight:600;cursor:pointer;font-size:14px}

  .cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:0 4px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .stat .n{font-size:26px;font-weight:800}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:2px}
  .stat.ok .n{color:var(--done)}
  .stat.no .n{color:var(--warn)}
  .grid14{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin:14px 4px 0}
  .mini{aspect-ratio:1;border-radius:8px;background:#64748b;color:#0b1220;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:15px;cursor:pointer}
  .mini.done{background:linear-gradient(135deg,var(--done),var(--done2));color:#fff}
  .mini small{font-size:8px;font-weight:600}

  .arow{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;display:flex;gap:11px;align-items:center}
  .arow .ic{width:38px;height:38px;border-radius:9px;background:#64748b;color:#0b1220;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;font-size:12px;text-align:center;line-height:1.1}
  .arow.done .ic{background:var(--done);color:#fff}
  .arow .tx{flex:1;min-width:0}
  .arow .tx b{font-size:14px}
  .arow .tx div{font-size:12px;color:var(--muted);margin-top:2px}
  .arow img{width:42px;height:42px;border-radius:8px;object-fit:cover;cursor:pointer}
  .arow .st{font-size:12px;font-weight:700;padding:4px 8px;border-radius:8px}
  .arow .st.no{background:#3f2d12;color:#fcd34d}
  .arow .st.ok{background:#064e3b;color:#6ee7b7}

  .log{margin:6px 4px 40px}
  .log-item{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px;display:flex;gap:12px;align-items:center}
  .log-item .ic{width:40px;height:40px;border-radius:10px;background:var(--done);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;font-size:12px;text-align:center;line-height:1.05}
  .log-item .ic.task{background:var(--accent)}
  .log-item .tx{flex:1;min-width:0}
  .log-item .tx b{font-size:14px}
  .log-item .tx div{font-size:12px;color:var(--muted);margin-top:2px}
  .log-item img{width:46px;height:46px;border-radius:8px;object-fit:cover;cursor:pointer}
  .empty{color:var(--muted);text-align:center;padding:24px;font-size:14px}

  .tabbar{display:flex;gap:8px;margin:16px 4px 4px}
  .tabbar .btn{flex:1;padding:9px 6px;font-size:13.5px}
  .tabbar .btn.ghost.active{background:var(--accent);color:#fff}

  .memo{background:linear-gradient(135deg,#1e3a5f,#1e293b);border:1px solid #2563eb55;border-radius:14px;padding:14px 16px;margin:0 4px 8px}
  .memo h4{margin:0 0 10px;font-size:14.5px;color:#bfdbfe;display:flex;align-items:center;gap:7px}
  .task-staff{background:#0b1324;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:center}
  .task-staff.done{border-color:#16a34a55;background:#0c1f17}
  .task-staff .t{flex:1;font-size:14px}
  .task-staff .t small{display:block;color:var(--muted);font-size:11.5px;margin-top:2px}
  .task-staff img{width:38px;height:38px;border-radius:7px;object-fit:cover;cursor:pointer}

  .addtask{display:flex;gap:8px;margin:6px 4px 14px}
  .addtask input{flex:1;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:#0b1324;color:var(--text);font-size:14px}
  .addtask input:focus{outline:none;border-color:var(--accent)}
  .admin-task{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px}
  .admin-task .top{display:flex;gap:10px;align-items:center}
  .admin-task .top b{flex:1;font-size:14px}
  .admin-task .sub{font-size:12px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:8px}
  .admin-task .sub img{width:34px;height:34px;border-radius:6px;object-fit:cover;cursor:pointer}
  .icon-btn{background:var(--panel2);border:none;color:var(--text);border-radius:8px;padding:6px 9px;font-size:12px;cursor:pointer}
  .icon-btn:hover{background:var(--line)}
  .icon-btn.del{color:#fca5a5}

  .cloud-tag{font-size:11.5px;padding:4px 9px;border-radius:999px;background:#064e3b;color:#6ee7b7}
  .cloud-tag.local{background:#3f2d12;color:#fcd34d}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px}
  .lightbox img{max-width:100%;max-height:100%;border-radius:10px}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginView">
  <div class="login-card">
    <div class="logo">🚿</div>
    <h2>大新店清潔紀錄系統</h2>
    <p class="sub">女浴室 · 清潔登記</p>
    <label class="fl" for="dept">部門</label>
    <select class="fld" id="dept"><option value="清潔部">清潔部</option></select>
    <label class="fl" for="p">密碼</label>
    <input class="fld" id="p" type="password" autocomplete="current-password" placeholder="請輸入密碼">
    <button class="btn" onclick="staffLogin()">登入</button>
    <div class="err" id="loginErr"></div>
  </div>
  <div class="secret" id="secret"></div>
</div>

<!-- ===== APP ===== -->
<div id="appView" class="hidden">
  <header>
    <div class="bar">
      <h1>大新店清潔紀錄</h1>
      <span class="cloud-tag" id="cloudTag">雲端</span>
      <span class="badge" id="roleBadge">—</span>
      <button class="btn ghost sm" onclick="logout()">登出</button>
    </div>
  </header>

  <!-- STAFF -->
  <div class="wrap" id="staffPanel">
    <div id="memoArea"></div>
    <div class="section-title">🧽 點選你已完成清潔的區域</div>
    <p class="hint">完成清潔後，直接點選對應區域並可上傳照片。完成的區域會變成<strong style="color:var(--done)">綠色</strong>。</p>
    <div class="plan-shell"><div class="plan" id="plan"></div></div>
    <div class="legend">
      <span><i class="dot d"></i>今日已清</span>
      <span><i class="dot g"></i>週期內</span>
      <span><i class="dot due"></i>今日待清</span>
      <span><i class="dot o"></i>逾期</span>
      <span><i class="dot r"></i>優先處理</span>
      <span>📷 已附照片</span>
    </div>
  </div>

  <!-- MANAGER -->
  <div class="wrap hidden" id="bossPanel">
    <div class="tabbar">
      <button class="btn ghost active" id="tabStatus" onclick="bossTab('status')">清潔狀況</button>
      <button class="btn ghost" id="tabTasks" onclick="bossTab('tasks')">交辦事項</button>
      <button class="btn ghost" id="tabLog" onclick="bossTab('log')">訊息紀錄</button>
    </div>

    <div id="bossStatus">
      <div class="cards">
        <div class="stat ok"><div class="n" id="cDone">0</div><div class="l">今日完成項數</div></div>
        <div class="stat no"><div class="n" id="cLeft">0</div><div class="l">逾期待清（超過週期）</div></div>
      </div>
      <p class="hint" style="margin-top:14px">👆 點任一區域可「確認已檢查完成」，系統會重設日期、顏色歸零。</p>
      <div class="section-title">🚿 淋浴間</div>
      <div class="grid14" id="grid14"></div>
      <div class="section-title">🧹 其他區域</div>
      <div id="fixList"></div>
      <div style="display:flex;gap:10px;margin:16px 4px 30px">
        <button class="btn ghost sm" onclick="exportCSV()">匯出紀錄CSV</button>
      </div>
    </div>

    <div id="bossTasks" class="hidden">
      <div class="section-title" style="margin-top:8px">📝 交辦事項（填寫後清潔人員登入會看到）</div>
      <div class="addtask">
        <input id="newTask" placeholder="輸入一項交辦事項…" onkeydown="if(event.key==='Enter')addTask()">
        <button class="btn" onclick="addTask()">＋ 新增</button>
      </div>
      <div id="taskAdminList"></div>
    </div>

    <div id="bossLog" class="hidden">
      <div class="section-title" style="margin-top:6px">📋 清潔訊息紀錄</div>
      <div class="log" id="logList"></div>
    </div>
  </div>
</div>

<div id="modal"></div>
<div id="lb"></div>

   資料層
   ============================================================ */
let SAVED_CFG=null;
try{ SAVED_CFG=JSON.parse(localStorage.getItem("dx_fbcfg")||"null"); }catch(e){}
const ACTIVE_CONFIG=(SAVED_CFG&&SAVED_CFG.projectId)?SAVED_CFG:FIREBASE_CONFIG;
let useCloud=!!ACTIVE_CONFIG.projectId;
let db=null, listenersStarted=false;
let itemState={};   // {id:{status,by,at,photo}}
let tasksCache=[];  // [{id,text,order,status,by,at,photo}]
let logsCache=[];
let session=null;
let noticeShown=false;

function isToday(ts){ if(!ts) return false; const d=new Date(ts),n=new Date();
  return d.getFullYear()==n.getFullYear()&&d.getMonth()==n.getMonth()&&d.getDate()==n.getDate(); }
function fmtTime(ts){ const d=new Date(ts);
  return d.getFullYear()+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getDate()).padStart(2,"0")
    +" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function todayKey(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function doneToday(rec){ return rec && rec.status==="done" && isToday(rec.at); }
function daysSince(ts){ if(!ts) return Infinity; const a=new Date(ts); a.setHours(0,0,0,0); const n=new Date(); n.setHours(0,0,0,0); return Math.round((n-a)/86400000); }
// 各區清潔週期（天）：淋浴間 3 天；梳妝台 2 天；馬桶/垃圾桶/洗手台 每天
function targetOf(it){ if(!it) return 1; if(it.type==="shower") return 3; if(it.id==="VA"||it.id==="VB") return 2; return 1; }
// 顏色依「是否超過該區清潔週期」決定，週期內不報警
function ageOf(st, target){
  const T=target||1;
  const dd=(st&&st.at)?daysSince(st.at):Infinity;
  if(dd===0) return {dd,colorClass:"c-done",label:"今日已清",tag:"✓",priority:false,warn:false};
  if(dd===Infinity) return {dd,colorClass:"",label:"尚未清潔",tag:"未清",priority:false,warn:false};
  const over=dd-T;
  if(over<0) return {dd,colorClass:"",label:"週期內（"+dd+"天）",tag:dd+"天",priority:false,warn:false};
  if(over===0) return {dd,colorClass:"c-due",label:"今日待清",tag:"待清",priority:false,warn:false};
  if(over===1) return {dd,colorClass:"c-2",label:"逾期1天",tag:"逾1",priority:false,warn:true};
  if(over===2) return {dd,colorClass:"c-3",label:"逾期2天",tag:"逾2",priority:false,warn:true};
  if(over===3) return {dd,colorClass:"c-4",label:"逾期3天",tag:"逾3",priority:false,warn:true};
  return {dd,colorClass:"c-5",label:"優先處理",tag:"優先",priority:true,warn:true};
}

function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}

async function initCloud(){
  await loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js");
  await loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js");
  await loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js");
  firebase.initializeApp(ACTIVE_CONFIG);
  db = firebase.firestore();
  try{ await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.SESSION); }catch(e){}
  // 只有通過驗證登入後才讀取資料（資料庫規則要求 request.auth != null）
  firebase.auth().onAuthStateChanged(function(u){ if(u && !listenersStarted){ listenersStarted=true; startCloudListeners(); } });
}
function startCloudListeners(){
  db.collection("items").onSnapshot(s=>{ itemState={}; s.forEach(d=>itemState[d.id]=d.data()); renderAll(); });
  db.collection("tasks").orderBy("order").onSnapshot(s=>{ tasksCache=[]; s.forEach(d=>tasksCache.push(Object.assign({id:d.id},d.data()))); renderAll(); });
  db.collection("logs").orderBy("time","desc").limit(300).onSnapshot(s=>{ logsCache=[]; s.forEach(d=>logsCache.push(d.data())); renderAll(); });
}

function localLoad(){
  try{ itemState=JSON.parse(localStorage.getItem("dx_items")||"{}"); }catch(e){itemState={}}
  try{ tasksCache=JSON.parse(localStorage.getItem("dx_tasks")||"[]"); }catch(e){tasksCache=[]}
  try{ logsCache=JSON.parse(localStorage.getItem("dx_logs")||"[]"); }catch(e){logsCache=[]}
}
function localSaveAll(){
  try{
    localStorage.setItem("dx_items",JSON.stringify(itemState));
    localStorage.setItem("dx_tasks",JSON.stringify(tasksCache));
    localStorage.setItem("dx_logs",JSON.stringify(logsCache));
  }catch(e){}
}

/* ---------- 標記完成（區域 or 交辦） ---------- */
async function markDone(kind, id, photoDataUrl){
  const now=Date.now();
  const photo=photoDataUrl||"";
  const rec={status:"done",by:session.user,at:now,photo:photo};
  let label;
  if(kind==="task"){ const t=tasksCache.find(x=>x.id===id); label="交辦: "+(t?t.text:id); }
  else { const it=getItem(id); label=it?it.label:id; }
  const logEntry={item:id,label:label,kind:(kind==="task"?"交辦事項":"清潔"),user:session.user,time:now,photo:photo};
  if(useCloud){
    const coll = kind==="task" ? "tasks" : "items";
    await db.collection(coll).doc(String(id)).set(rec,{merge:true});
    await db.collection("logs").add(logEntry);
  }else{
    if(kind==="task"){ const t=tasksCache.find(x=>x.id===id); if(t){ t.status="done"; t.by=session.user; t.at=now; t.photo=photo; } }
    else { itemState[id]=rec; }
    logsCache.unshift(logEntry); renderAll(); localSaveAll();
  }
}

async function resetTodayData(){
  if(useCloud){
    const batch=db.batch();
    ITEMS.forEach(it=>batch.set(db.collection("items").doc(it.id),{status:"pending"},{merge:true}));
    tasksCache.forEach(t=>batch.set(db.collection("tasks").doc(t.id),{status:"pending"},{merge:true}));
    await batch.commit();
  }else{
    Object.keys(itemState).forEach(k=>{ if(itemState[k]) itemState[k].status="pending"; });
    tasksCache.forEach(t=>t.status="pending");
    localSaveAll(); renderAll();
  }
}

async function addTask(){
  const el=document.getElementById("newTask"); const v=el.value.trim(); if(!v) return;
  const order=Date.now();
  if(useCloud){ await db.collection("tasks").add({text:v,order:order,createdAt:order}); }
  else { tasksCache.push({id:"t"+order,text:v,order:order,createdAt:order}); localSaveAll(); renderAll(); }
  el.value="";
}
async function editTask(id){
  const t=tasksCache.find(x=>x.id===id); if(!t) return;
  const v=prompt("修改交辦事項：",t.text); if(v===null) return;
  const nv=v.trim(); if(!nv) return;
  if(useCloud){ await db.collection("tasks").doc(id).set({text:nv},{merge:true}); }
  else { t.text=nv; localSaveAll(); renderAll(); }
}
async function deleteTask(id){
  if(!confirm("確定刪除這項交辦事項?")) return;
  if(useCloud){ await db.collection("tasks").doc(id).delete(); }
  else { tasksCache=tasksCache.filter(x=>x.id!==id); localSaveAll(); renderAll(); }
}

/* ============================================================
   完成登記彈窗（共用：區域 / 交辦）
   ============================================================ */
let pendingPhoto=null, curKind=null, curId=null;
function openDo(kind,id){
  pendingPhoto=null; curKind=kind; curId=id;
  let title,tipsHtml,info="";
  if(kind==="task"){
    const t=tasksCache.find(x=>x.id===id);
    title="交辦事項"; tipsHtml='<div class="tips"><b>事項內容</b><ul><li>'+(t?escapeHtml(t.text):'')+'</li></ul></div>';
    if(t&&doneToday(t)) info='本日已由 <b>'+(t.by||'—')+'</b> 於 '+fmtTime(t.at)+' 完成';
  }else{
    const it=getItem(id); title=it.label;
    tipsHtml='<div class="tips"><b>清潔提示</b><ul>'+tipsOf(it).map(t=>'<li>'+t+'</li>').join('')+'</ul></div>';
    const st=itemState[id]; const a=ageOf(st, targetOf(it));
    if(a.dd===0) info='本日已由 <b>'+(st.by||'—')+'</b> 於 '+fmtTime(st.at)+' 清潔';
    else if(a.dd===Infinity) info='尚未有清潔紀錄（目標：每 '+targetOf(it)+' 天清一次）';
    else info=a.label+'　上次：'+fmtTime(st.at)+'（目標每 '+targetOf(it)+' 天）';
    if(a.priority) info='<span style="color:#fca5a5;font-weight:800">⚠️ 已超過清潔週期，請優先處理！</span><br>'+info;
  }
  const existPhoto=(kind==="item" && itemState[id] && itemState[id].photo)?itemState[id].photo:"";
  const pboxHtml=existPhoto?('目前照片<br><img src="'+existPhoto+'">'):'📷 清潔後照片(選填)<br><span style="font-size:12px">拍照或選擇相片</span>';
  const btnLabel=session.role==="boss"?"✓ 確認已檢查完成":"✓ 完成登記";
  document.getElementById("modal").innerHTML=`
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="sheet">
        <h3>${title}</h3>
        <p class="meta">${info}</p>
        ${tipsHtml}
        <div class="photo-box" id="pbox">${pboxHtml}</div>
        <label class="file-btn">📸 拍照 / 選擇照片
          <input type="file" accept="image/*" capture="environment" style="display:none" onchange="onPhoto(event)"></label>
        <div class="row" style="margin-top:16px">
          <button class="btn ghost" onclick="closeModal()">取消</button>
          <button class="btn" id="confirmBtn" onclick="confirmDo()">${btnLabel}</button>
        </div>
      </div>
    </div>`;
}
function closeModal(){ document.getElementById("modal").innerHTML=""; pendingPhoto=null; }

function onPhoto(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=900; let{width:w,height:h}=img;
      if(w>max||h>max){ const r=Math.min(max/w,max/h); w=w*r|0; h=h*r|0; }
      const c=document.createElement("canvas"); c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      let q=0.7,data=c.toDataURL("image/jpeg",q);
      while(data.length>700000&&q>0.3){ q-=0.1; data=c.toDataURL("image/jpeg",q); }
      pendingPhoto=data;
      document.getElementById("pbox").innerHTML='✓ 已選擇照片<br><img src="'+pendingPhoto+'">';
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}
async function confirmDo(){
  const btn=document.getElementById("confirmBtn"); btn.disabled=true; btn.textContent="處理中…";
  try{ await markDone(curKind,curId,pendingPhoto); closeModal(); toast("已登記完成 ✓"); }
  catch(err){ btn.disabled=false; btn.textContent="✓ 完成登記"; alert("儲存失敗: "+err.message); }
}

      <div class="tx"><b>${escapeHtml(l.label||'')} 已完成</b>
        <div>👤 ${l.user} · ${fmtTime(l.time)}</div></div>
      ${l.photo?`<img src="${l.photo}" onclick="showLightbox('${cssUrl(l.photo)}')">`:''}`;
    list.appendChild(it);
  });
}
function resetToday(){
  if(confirm("確定將所有區域與交辦事項重設為「未完成」?(每日開始時使用,歷史紀錄保留)")) resetTodayData();
}
function exportCSV(){
  let csv="類別,項目,人員,時間,有照片\n";
  logsCache.slice().sort((a,b)=>b.time-a.time).forEach(l=>{
    csv+=`${l.kind||'清潔'},${(l.label||'').replace(/,/g,' ')},${l.user},${fmtTime(l.time)},${l.photo?'是':'否'}\n`;
  });
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="清潔紀錄_"+todayKey()+".csv"; a.click();
}

/* ---------- 工具 ---------- */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function cssUrl(s){ return String(s).replace(/'/g,"\\'"); }
function showLightbox(src){
  document.getElementById("lb").innerHTML=`<div class="lightbox" onclick="document.getElementById('lb').innerHTML=''"><img src="${src}"></div>`;
}
function toast(msg){
  const t=document.createElement("div"); t.textContent=msg;
  t.style.cssText="position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#16a34a;color:#fff;padding:12px 20px;border-radius:12px;z-index:80;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.4)";
  document.body.appendChild(t);
  setTimeout(()=>{t.style.transition=".4s";t.style.opacity="0";},1600);
  setTimeout(()=>t.remove(),2100);
}

/* ============================================================
   主渲染
   ============================================================ */
function renderAll(){
  if(!session) return;
  if(session.role==="staff"){
    renderPlan(); renderMemoStaff();
    if(!noticeShown && tasksCache.length){ noticeShown=true; showTaskNotice(); }
  }else{
    renderBoss();
  }
}

/* ============================================================
   啟動
   ============================================================ */
(async function start(){
  buildPlan();
  const tag=document.getElementById("cloudTag");
  if(useCloud){
    tag.textContent="雲端同步"; tag.className="cloud-tag";
    try{ await initCloud(); }
    catch(e){ useCloud=false; tag.textContent="本機(連線失敗)"; tag.className="cloud-tag local"; localLoad(); renderAll(); }
  }else{
    tag.textContent="本機儲存"; tag.className="cloud-tag local"; localLoad();
  }
  document.getElementById("p").addEventListener("keydown",e=>{if(e.key==="Enter")staffLogin();});
})();
</script>
